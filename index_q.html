<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forecast Extractor</title>
  <script src="tableau.extensions.1.latest.min.js"></script>
  <script src="extension_q.js" defer></script>
  <style>
    body { font-family: sans-serif; padding: 12px; font-size: 13px; margin: 0; }
    #status { color: #888; font-size: 11px; margin-bottom: 10px; }
    #summary {
      display: flex;
      gap: 10px;
    }
    .summary-card {
      flex: 1;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
    }
    .summary-card .label { color: #666; margin-bottom: 4px; }
    .summary-card .value { font-size: 16px; font-weight: 600; }
    .card-actual   { background: #e8f0fe; border-left: 4px solid #3b6abf; }
    .card-estimate { background: #e8f0fe; border-left: 4px solid #3b6abf; }
    .card-total    { background: #e8f0fe; border-left: 4px solid #3b6abf; }
  </style>
</head>
<body>
  <div id="summary">
    <div class="summary-card card-actual">
      <div class="label">Sum of Actuals(Quantity)</div>
      <div class="value" id="sum-actual">—</div>
    </div>
    <div class="summary-card card-estimate">
      <div class="label">Sum of Estimates(Quantity)</div>
      <div class="value" id="sum-estimate">—</div>
    </div>
    <div class="summary-card card-total">
      <div class="label">Grand Total(Quantity)</div>
      <div class="value" id="sum-total">—</div>
    </div>
  </div>
</body>
</html>
